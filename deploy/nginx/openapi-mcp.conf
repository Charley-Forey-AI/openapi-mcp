# Nginx snippet for openapi-mcp-builder.
#
# Drop this inside the existing `server { ... }` block that already fronts
# your other /mcp/* servers. It adds ONE new `location` for this MCP only
# and does not touch any siblings. The prefix is declared without a trailing
# slash (to match sibling conventions like `location /mcp/accubid {`) and so
# that the exact public URL `/mcp/openapi-mcp` matches.
#
# Path layout:
#   Public URL  : https://<your-host>/mcp/openapi-mcp
#   Upstream    : http://127.0.0.1:8754  (same full path, no rewrite)
#
# The upstream app is configured with MCP_PATH=/mcp/openapi-mcp so the
# FastMCP Streamable HTTP endpoint is mounted at exactly the public URI --
# no proxy_pass rewrite, no trailing-slash trickery, SSE and POST both work.

location /mcp/openapi-mcp {
    proxy_pass              http://127.0.0.1:8754;
    proxy_http_version      1.1;

    # Streamable HTTP / SSE friendliness
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;
    proxy_read_timeout      1h;
    proxy_send_timeout      1h;
    chunked_transfer_encoding on;

    # Forward the end-user's Trimble ID on-behalf-of bearer token verbatim.
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        Authorization     $http_authorization;
    proxy_pass_request_headers on;

    # Large specs allowed up to 1000 MiB (matches MAX_SPEC_BYTES default)
    client_max_body_size    1024m;
}
